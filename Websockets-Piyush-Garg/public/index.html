<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
</head>
<body>
    <h1>Chatting</h1>

    <input type="text" placeholder="Enter Message" id="message">
    <button id="sendButton">Send</button>

    <div id="messages"></div>
    
    <!-- Load the Socket.IO client script -->
    <script src="https://cdn.socket.io/4.1.3/socket.io.min.js"></script>

    <script>
        const socket = io(); // Establish connection to the server
        const sendButton = document.getElementById('sendButton');
        const messageInput = document.getElementById('message');
        const allMessages = document.getElementById('messages')
        socket.on('message',(message)=>{
            const p = document.createElement('p');
            p.innerText=message;
            allMessages.appendChild(p)
        })
        sendButton.addEventListener('click', () => {
            const message = messageInput.value;
            console.log(message); // Log the entered message to the console

            // If the server is set up, you can send the message through Socket.IO like this:
            socket.emit('chat-message', message);

            
        });
    </script>
</body>
</html>
